<html lang="en">
<head>

<title>Creative Writing: Figurative Language Quiz</title>
<style>

    --text: #2c2416;

    --accent: #4a3728;
    --correct: #2d6a4f;

    --highlight: #e9c46a;

  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    max-width: 780px;
    margin: 0 auto 3rem;
    padding-bottom: 2rem;
    border-bottom: 2px solid var(--border);
    position: relative;
  }

  header::after {
    content: '✦';
    position: absolute;
    bottom: -0.7rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    padding: 0 0.75rem;
    color: var(--accent);
    font-size: 0.9rem;
  }

  .subtitle {
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
    font-weight: 300;
  }

  h1 {
    font-family: 'Playfair Display', 'Georgia', serif;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    color: var(--accent);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .instruction {
    font-size: 0.88rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 0.8rem;
  }

  /* Score bar */
  #score-bar {
    max-width: 780px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1.25rem;
    font-size: 0.9rem;
    color: var(--muted);
  }

  #score-bar .score-label { font-weight: 300; font-style: italic; }

  .section-header {
    max-width: 780px;
    margin: 2.5rem auto 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .section-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    letter-spacing: 0.05em;
    color: white;
    background: var(--accent);
    padding: 0.3rem 0.9rem;
    border-radius: 4px;
    white-space: nowrap;
  }

  .section-header .section-desc {
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

    max-width: 780px;
    margin: 0 auto 1.25rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s;

    display: flex;
    align-items: flex-start;
    gap: 0.85rem;
    padding: 1.1rem 1.25rem 0.85rem;

    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--accent);
    min-width: 2rem;
    padding-top: 0.05rem;
    opacity: 0.6;
  }

  .q-text {
    font-size: 0.97rem;
    line-height: 1.65;
    color: var(--text);
  }

  .q-text em { font-style: italic; color: var(--accent); }

  .options-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 0.5rem;
    padding: 0.85rem 1.25rem;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.55rem 0.8rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    background: transparent;
    font-family: 'Source Serif 4', serif;
    font-size: 0.88rem;
    color: var(--text);
    text-align: left;
  }

  .option:hover:not(.answered) {
    border-color: var(--accent);
    background: rgba(74,55,40,0.05);
    transform: translateY(-1px);
  }

  .option .opt-letter {
    font-family: 'Playfair Display', serif;
    font-size: 0.8rem;
    color: var(--muted);
    min-width: 1.1rem;
  }

  .option.correct {
    background: var(--correct-bg);
    border-color: var(--correct-border);
    color: var(--correct);
  }

  .option.correct .opt-letter { color: var(--correct); }

  .option.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong-border);
    color: var(--wrong);
  }

  .option.wrong .opt-letter { color: var(--wrong); }

  .option.revealed-correct {
    background: rgba(216,243,220,0.35);
    border-color: var(--correct-border);
    color: var(--correct);
    opacity: 0.75;
  }

  .option.disabled { pointer-events: none; }

  /* Explanation box */
  .explanation {
    display: none;
    margin: 0 1.25rem 1rem;
    padding: 0.75rem 1rem;
    background: linear-gradient(135deg, #fef9ee, #fff8e7);
    border-left: 3px solid var(--highlight);
    border-radius: 0 8px 8px 0;
    font-size: 0.86rem;
    line-height: 1.6;
    color: var(--muted);
  }

  .explanation.show { display: block; animation: fadeIn 0.3s ease; }
  .explanation strong { color: var(--accent); }

  .answer-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff8e0;
    font-family: 'Playfair Display', serif;
    font-size: 0.78rem;
    padding: 0.15rem 0.55rem;
    border-radius: 4px;
    margin-right: 0.4rem;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse-correct {
    0%,100% { box-shadow: 0 0 0 0 rgba(45,106,79,0); }
    50% { box-shadow: 0 0 0 6px rgba(45,106,79,0.2); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-5px); }
    40%,80% { transform: translateX(5px); }
  }

  .option.correct { animation: pulse-correct 0.6s ease; }
  .option.wrong { animation: shake 0.4s ease; }

  /* Results summary */
  #results-banner {
    display: none;
    max-width: 780px;
    margin: 3rem auto 1rem;
    text-align: center;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 2rem;

  #results-banner h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--accent);
    margin-bottom: 0.5rem;

  #final-score { font-size: 3rem; font-family: 'Playfair Display', serif; color: var(--accent); margin: 1rem 0 0.5rem; }

  footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 0.78rem;
    color: var(--muted);
    font-style: italic;
    letter-spacing: 0.05em;

</style>

const SECTIONS = [
  { label:"Section I", range:[1,10], desc:"Tropes: Accismus to Correctio" },
  { label:"Section II", range:[11,20], desc:"Schemes: Dehortatio to Zeugma" },
  { label:"Section III", range:[21,30], desc:"Repetition Schemes" },
  { label:"Section IV", range:[31,40], desc:"Sound & Word Form Devices" }
];

// ─── State ────────────────────────────────────────────────────────────────────
const answered = {};
let correctCount = 0;

// ─── Sound via Web Audio API ──────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx;

function getCtx() {
  if (!ctx) ctx = new AudioCtx();
  return ctx;
}

function playCorrect() {
  const ac = getCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(523.25, ac.currentTime);      // C5
  osc.frequency.setValueAtTime(659.25, ac.currentTime+0.12); // E5
  osc.frequency.setValueAtTime(783.99, ac.currentTime+0.24); // G5
  gain.gain.setValueAtTime(0.18, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.55);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime+0.55);
}

function playWrong() {
  const ac = getCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220, ac.currentTime);
  osc.frequency.setValueAtTime(180, ac.currentTime+0.1);
  gain.gain.setValueAtTime(0.12, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.35);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime+0.35);
}

// ─── Build Quiz ───────────────────────────────────────────────────────────────
function buildQuiz() {
  const container = document.getElementById('quiz-container');

  SECTIONS.forEach(sec => {
    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `<h2>${sec.label}</h2><span class="section-desc">${sec.desc}</span>`;
    container.appendChild(hdr);

    for (let n = sec.range[0]; n <= sec.range[1]; n++) {
      const q = QUESTIONS[n - 1];
      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = `q${q.id}`;

      const header = document.createElement('div');
      header.className = 'question-header';
      header.innerHTML = `<span class="q-number">${q.id}.</span><span class="q-text">${q.text}</span>`;
      card.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'options-grid';

      q.opts.forEach(([letter, label]) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.dataset.letter = letter;
        btn.dataset.qid = q.id;
        btn.innerHTML = `<span class="opt-letter">${letter}.</span>${label}`;
        btn.addEventListener('dblclick', handleAnswer);
        grid.appendChild(btn);
      });

      card.appendChild(grid);

      const expl = document.createElement('div');
      expl.className = 'explanation';
      expl.id = `expl${q.id}`;
      card.appendChild(expl);

      container.appendChild(card);
    }
  });
}

function handleAnswer(e) {
  const btn = e.currentTarget;
  const qid = parseInt(btn.dataset.qid);
  const letter = btn.dataset.letter;

  if (answered[qid]) return;
  answered[qid] = true;

  const correct = ANSWERS[qid];
  const card = document.getElementById(`q${qid}`);
  const allBtns = card.querySelectorAll('.option');

  allBtns.forEach(b => {
    b.classList.add('disabled');
    if (b.dataset.letter === correct && b !== btn) {
      b.classList.add('revealed-correct');
    }
  });

  const isCorrect = letter === correct;

  if (isCorrect) {
    btn.classList.add('correct');
    playCorrect();
    correctCount++;
  } else {
    btn.classList.add('wrong');
    playWrong();
  }

  const expl = document.getElementById(`expl${qid}`);
  expl.innerHTML = EXPLANATIONS[qid];
  expl.classList.add('show');

  updateScore();

  if (Object.keys(answered).length === QUESTIONS.length) {
    showResults();
  }
}

function updateScore() {
  const total = Object.keys(answered).length;
  document.getElementById('score-display').textContent = `${correctCount} / 40`;
  document.getElementById('progress-fill').style.width = `${(total / 40) * 100}%`;
}

function showResults() {
  const banner = document.getElementById('results-banner');
  banner.style.display = 'block';
  document.getElementById('final-score').textContent = `${correctCount} / 40`;
  const pct = Math.round((correctCount / 40) * 100);
  let msg = '';
  if (pct >= 90) msg = 'Outstanding! You have a masterful command of literary tropes and schemes.';
  else if (pct >= 75) msg = 'Well done! A solid grasp of figurative language — just a few terms to revisit.';
  else if (pct >= 55) msg = 'Good effort! Review the explanations to sharpen your knowledge.';
  else msg = 'Keep studying! The explanations above will guide you toward mastery.';
  document.getElementById('final-msg').textContent = msg;
  banner.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

buildQuiz();
</script>
